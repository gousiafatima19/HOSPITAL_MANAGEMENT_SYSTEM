<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        body {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-body">
                        <h2 class="card-title mb-4">Update Appointment</h2>

                        <form method="POST">
                            {% csrf_token %}
                            <input type="text" class="form-control" 
                                    name="patient"
                                    value="{{ appointment.patient.name }}" required>

                            <!-- Doctor Dropdown -->
                            <div class="mb-3">
                                <label class="form-label">Doctor</label>
                                <select name="doctor" class="form-control" required>
                                    {% for d in doctors %}
                                        <option value="{{ d.id }}" 
                                            {% if appointment.doctor.id == d.id %}selected{% endif %}>
                                            {{ d.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <!-- DateTime -->
                            <div class="mb-3">
                                <label class="form-label">Appointment Time</label>
                                <input type="datetime-local" class="form-control" 
                                       name="appointment_time"
                                       value="{{ appointment.appointment_time|date:'Y-m-d\\TH:i' }}" required>
                            </div>

                            <!-- Status -->
                            <div class="mb-3">
                                <label class="form-label">Status</label>
                                <input type="text" class="form-control" 
                                       name="appointment_status"
                                       value="{{ appointment.appointment_status }}" required>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Update Appointment</button>
                                <a href="/appointments" class="btn btn-secondary">Cancel</a>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
